plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.12'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'org.iimsa'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

ext {
    set('springCloudVersion', "2025.0.1")
}

repositories {
    mavenCentral()

    maven {
        name = "GitHubPackages"
        url = uri("https://maven.pkg.github.com/apangmsa/common-module")
        //url = uri("https://maven.pkg.github.com/yonggyo1125/spartahub-common")
        credentials {
            username = System.getenv("GPR_USER")
            password = System.getenv("GPR_TOKEN")
        }
    }
}

// [해결] GitHub Packages의 SNAPSHOT 의존성이 로컬 캐시 때문에 갱신되지 않는 문제 방지
// Gradle은 기본적으로 SNAPSHOT을 24시간 동안 캐싱하지만,
// 아래 설정을 통해 빌드 시마다 원격 저장소의 최신 SNAPSHOT을 확인하도록 강제함.
configurations.all {
    resolutionStrategy.cacheChangingModulesFor 0, 'seconds'
}
dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
    }
}

dependencies {
    implementation 'com.iimsa:common:2.0-SNAPSHOT'

    /**여기에 각자 의존성 작성*/

    // Querydsl APT
    annotationProcessor 'jakarta.annotation:jakarta.annotation-api'
    annotationProcessor 'jakarta.persistence:jakarta.persistence-api'
    annotationProcessor 'com.querydsl:querydsl-apt:5.1.0:jakarta'

    // Querydsl JPA
    runtimeOnly 'org.postgresql:postgresql'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'

    testRuntimeOnly 'com.h2database:h2'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}
